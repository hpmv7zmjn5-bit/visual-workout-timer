<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Visual Timer" />
  <title>Visual Workout Timer v1.14</title>
  <style>
    :root {
      --bg:#000;
      --fg:#fff;
      --accent:#39ff88;
      --accent2:#00d4ff;
      --muted:#8b8b8b;
      --panel:#111;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; width:100%; height:100%; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif; }
    body { min-height:100dvh; overflow:hidden; }
    button, select, input { font:inherit; }
    button { cursor:pointer; }
    .screen { width:100%; height:100dvh; padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); }
    .hidden { display:none !important; }

    #setup { overflow:auto; background:linear-gradient(180deg,#090909,#000); }
    h1 { margin:8px 0 2px; font-size:clamp(28px,6vw,46px); }
    .sub { color:#aaa; margin-bottom:18px; }
    .toolbar, .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .card { background:#111; border:1px solid #252525; border-radius:18px; padding:14px; margin:12px 0; }
    .block-title { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .block-title input { flex:1; min-width:0; }
    label { display:block; color:#bbb; font-size:13px; margin-bottom:5px; }
    input, select {
      width:100%; color:white; background:#1b1b1b; border:1px solid #333; border-radius:12px; padding:11px 12px;
    }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:12px; }
    .primary { background:#fff; color:#000; border:0; border-radius:14px; padding:13px 18px; font-weight:800; }
    .secondary { background:#1d1d1d; color:#fff; border:1px solid #333; border-radius:14px; padding:12px 16px; }
    .danger { background:#241010; color:#ff8e8e; border:1px solid #5b2424; border-radius:12px; padding:9px 12px; }
    #estimate { margin:14px 0; font-weight:700; color:#ddd; }

    #timer { position:relative; background:#000; display:flex; flex-direction:column; justify-content:space-between; }
    .timer-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; z-index:3; }
    .phase { font-size:clamp(18px,3vw,28px); font-weight:900; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
    .meta { color:#aaa; font-size:clamp(13px,2vw,18px); text-align:right; }
    .visual-wrap { flex:1; display:grid; place-items:center; min-height:0; padding:0; margin:-4px -8px; }
    .seconds {
      position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; z-index:2;
      font-size:clamp(108px,31vw,360px); font-weight:1000; line-height:1; font-variant-numeric:tabular-nums;
      text-shadow:0 2px 26px rgba(0,0,0,.72);
    }
    .bar-h, .bar-v { overflow:hidden; background:#151515; border:1px solid #2a2a2a; }
    .bar-h { width:min(96vw,1450px); height:clamp(145px,34vh,380px); border-radius:38px; }
    .bar-v { width:clamp(155px,38vw,410px); height:min(72vh,850px); border-radius:38px; display:flex; align-items:flex-end; }
    .fill { width:100%; height:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); transition:width .08s linear,height .08s linear; }
    .circle { width:min(88vw,70vh,800px); aspect-ratio:1; border-radius:50%; background:conic-gradient(var(--accent) 0deg,var(--accent2) var(--deg),#161616 var(--deg)); display:grid; place-items:center; box-shadow:0 0 48px color-mix(in srgb, var(--accent) 38%, transparent); }
    .circle::after { content:""; width:68%; aspect-ratio:1; border-radius:50%; background:#000; border:1px solid #292929; }
    .exercise-guide {
      position:absolute;
      left:max(14px,env(safe-area-inset-left));
      top:clamp(88px,13vh,128px);
      z-index:4;
      width:min(43vw,230px);
      padding:10px 10px 9px;
      border:1px solid color-mix(in srgb,var(--accent) 40%,#333);
      border-radius:20px;
      background:rgba(8,8,8,.80);
      box-shadow:0 14px 45px rgba(0,0,0,.46),0 0 28px color-mix(in srgb,var(--accent) 13%,transparent);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      transition:opacity .25s ease,transform .25s ease;
      pointer-events:none;
    }
    .exercise-guide.guide-dimmed { opacity:.67; }
    .guide-title {
      color:var(--accent); font-size:clamp(13px,3vw,17px); font-weight:900;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px;
    }
    .guide-stage {
      width:100%; aspect-ratio:1.16; overflow:hidden; border-radius:14px;
      background:radial-gradient(circle at 50% 42%,color-mix(in srgb,var(--accent) 13%,#111),#070707 68%);
      border:1px solid #292929;
    }
    #guideCanvas { display:block; width:100%; height:100%; }
    .guide-cues { margin:7px 0 0; padding:0; list-style:none; display:grid; gap:3px; }
    .guide-cues li { color:#d0d0d0; font-size:clamp(9px,2.15vw,12px); line-height:1.18; }
    .guide-cues li::before { content:"•"; color:var(--accent); margin-right:5px; }
    .guide-label { margin-top:5px; color:#777; font-size:9px; letter-spacing:.04em; text-transform:uppercase; }

    .timer-bottom { position:relative; z-index:5; display:flex; flex-direction:column; gap:10px; }
    .session-progress {
      width:100%; padding:0 2px;
      transition:opacity .25s ease;
    }
    .session-progress-labels {
      display:flex; justify-content:space-between; gap:12px;
      margin-bottom:6px; color:#b7b7b7; font-size:12px;
      font-variant-numeric:tabular-nums;
    }
    .session-progress-track {
      height:9px; width:100%; overflow:hidden;
      background:#202020; border:1px solid #343434; border-radius:999px;
    }
    .session-progress-fill {
      width:0%; height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:999px;
      transition:width .08s linear;
    }
    .timer-controls {
      display:flex; justify-content:center; gap:12px; z-index:4;
      opacity:1; visibility:visible; transform:translateY(0);
      transition:opacity .28s ease, transform .28s ease, visibility 0s linear;
    }
    #timer.controls-hidden .timer-controls {
      opacity:0 !important;
      visibility:hidden;
      transform:translateY(14px);
      pointer-events:none;
      transition:opacity .28s ease, transform .28s ease, visibility 0s linear .28s;
    }
    .timer-controls button { min-width:110px; }
    .big-start { font-size:18px; }
    .count-actions {
      position:absolute; left:50%; bottom:clamp(88px,15vh,145px); transform:translateX(-50%);
      z-index:6; width:min(88vw,560px); display:flex; justify-content:center; gap:9px; flex-wrap:wrap;
    }
    .count-button {
      min-width:min(68vw,300px); padding:13px 17px;
      border-radius:999px; border:2px solid var(--accent);
      color:#fff; background:rgba(10,10,10,.88); font-weight:900;
      box-shadow:0 0 28px color-mix(in srgb,var(--accent) 28%,transparent);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .count-button:active { transform:scale(.97); }
    .count-status {
      position:absolute; left:0; right:0; top:calc(50% + clamp(62px,12vw,135px));
      z-index:3; text-align:center; pointer-events:none;
      color:#c9c9c9; font-size:clamp(13px,3vw,20px); font-weight:750;
      text-shadow:0 2px 12px #000;
    }
    #timer.count-mode .seconds { font-size:clamp(118px,32vw,390px); }
    .mode-note { color:#858585; font-size:11px; line-height:1.25; margin-top:5px; }

    @media (orientation:portrait) and (max-width:430px) {
      .exercise-guide { width:min(41vw,178px); top:108px; padding:8px; border-radius:17px; }
      .guide-title { font-size:12px; }
      .guide-cues { gap:2px; margin-top:5px; }
      .guide-cues li { font-size:9px; }
      .guide-label { display:none; }
    }

    @media (orientation:landscape) {
      #timer { padding-top:max(10px,env(safe-area-inset-top)); padding-bottom:max(10px,env(safe-area-inset-bottom)); }
      .visual-wrap { padding:0; margin:-8px -12px; }
      .seconds { font-size:clamp(116px,32vh,360px); }
      .bar-h { width:min(94vw,1700px); height:48vh; }
      .bar-v { height:76vh; width:26vw; }
      .circle { width:min(76vh,780px); }
      .exercise-guide {
        top:clamp(64px,11vh,98px);
        width:min(25vw,310px);
        padding:10px;
      }
      .guide-cues { grid-template-columns:1fr; gap:2px; }
      .guide-cues li { font-size:clamp(9px,1.15vw,12px); }
      .timer-bottom { gap:7px; }
      .session-progress-labels { margin-bottom:4px; font-size:11px; }
      .session-progress-track { height:8px; }
      .timer-controls { position:absolute; right:max(12px,env(safe-area-inset-right)); bottom:calc(max(12px,env(safe-area-inset-bottom)) + 24px); opacity:.78; }
      .timer-controls button { min-width:auto; padding:10px 13px; }
      .count-actions { bottom:50px; width:min(58vw,650px); flex-wrap:nowrap; }
      .count-button { min-width:auto; padding:10px 15px; }
      .count-status { top:calc(50% + clamp(52px,11vh,110px)); font-size:clamp(12px,2.2vh,18px); }
  </style>
</head>
<body>
  <section id="setup" class="screen">
    <h1>Visual Workout Timer</h1>
    <div class="sub">Crea hasta 10 bloques. Cada bloque puede medirse por tiempo o por cantidad. <strong>v1.14</strong></div>

    <div class="card">
      <div class="grid">
        <div>
          <label>Tema</label>
          <select id="theme">
            <option value="yoga">Yoga — pacífico</option>
            <option value="cardio" selected>Cardio — fluorescente</option>
            <option value="boxing">Pesas / boxing</option>
          </select>
        </div>
        <div>
          <label>Visualización</label>
          <select id="visual">
            <option value="alternate" selected>Alternar automáticamente</option>
            <option value="horizontal">Barra horizontal</option>
            <option value="vertical">Barra vertical</option>
            <option value="circle">Círculo</option>
          </select>
        </div>
        <div>
          <label>Rondas completas</label>
          <select id="rounds">
            <option>1</option><option selected>2</option><option>3</option>
          </select>
        </div>
        <div>
          <label>Preparación inicial</label>
          <select id="prep">
            <option value="5">5 segundos</option>
            <option value="10" selected>10 segundos</option>
            <option value="15">15 segundos</option>
          </select>
        </div>
        <div>
          <label>Sonido de countdown</label>
          <select id="countdownSound">
            <option value="classic" selected>Beep clásico de gimnasio</option>
            <option value="chime">Doble campana</option>
            <option value="sport">Click deportivo</option>
          </select>
        </div>
        <div>
          <label>Referencia visual</label>
          <select id="exerciseGuideMode">
            <option value="always" selected>Mostrar siempre</option>
            <option value="prep">Solo durante preparación</option>
            <option value="off">No mostrar</option>
          </select>
        </div>
      </div>
    </div>

    <div id="blocks"></div>

    <div class="toolbar">
      <button id="addBlock" class="secondary">+ Añadir bloque</button>
      <button id="saveRoutine" class="secondary">Guardar configuración</button>
      <button id="testSound" class="secondary">🔊 Probar 3–2–1</button>
    </div>
    <div id="estimate"></div>
    <button id="start" class="primary big-start">Comenzar rutina</button>
  </section>

  <section id="timer" class="screen hidden">
    <div class="timer-top">
      <div>
        <div id="phase" class="phase">Preparación</div>
        <div id="exerciseName">Prepárate</div>
      </div>
      <div id="meta" class="meta"></div>
    </div>

    <aside id="exerciseGuide" class="exercise-guide hidden" aria-label="Referencia visual del ejercicio">
      <div id="guideTitle" class="guide-title"></div>
      <div class="guide-stage"><canvas id="guideCanvas" width="420" height="360"></canvas></div>
      <ul id="guideCues" class="guide-cues"></ul>
      <div class="guide-label">Referencia visual · Ajusta a tu movilidad</div>
    </aside>

    <div id="visualWrap" class="visual-wrap">
      <div id="visualContainer"></div>
      <div id="seconds" class="seconds">10</div>
      <div id="countStatus" class="count-status hidden"></div>
      <div id="countActions" class="count-actions hidden">
        <button id="countButton" class="count-button" type="button">✓ Completar cantidad ahora</button>
      </div>
    </div>

    <div class="timer-bottom">
      <div class="session-progress" aria-label="Progreso total de la rutina">
        <div class="session-progress-labels">
          <span id="sessionElapsed">00:00</span>
          <span id="sessionRemaining">Restante 00:00</span>
        </div>
        <div class="session-progress-track">
          <div id="sessionProgressFill" class="session-progress-fill"></div>
        </div>
      </div>
      <div class="timer-controls">
        <button id="back" class="secondary">◀ Atrás</button>
        <button id="pause" class="primary">Pausa</button>
        <button id="next" class="secondary">Siguiente ▶</button>
        <button id="exit" class="danger">Salir</button>
      </div>
    </div>
  </section>

const blocksEl = $("#blocks");
let interval = null;
let timeline = [];
let index = 0;
let remainingMs = 0;
let segmentEnd = 0;

let audioContext = null;
let audioUnlocked = false;
let lastInteractionAt = 0;
let totalDurationMs = 0;
let segmentOffsetsMs = [];
let segmentWeightsMs = [];
let hasCountSegments = false;
let currentCount = 0;
let workoutStartedAt = 0;
let pausedStartedAt = 0;

  ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]);

function drawCapsule(ctx,a,b,width,color,alpha=1) {

function drawTaperedLimb(ctx,a,b,widthA,widthB,color,alpha=1) {
  const dx=b[0]-a[0], dy=b[1]-a[1], len=Math.hypot(dx,dy)||1;
  const nx=-dy/len, ny=dx/len;
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(a[0]+nx*widthA/2,a[1]+ny*widthA/2);
  ctx.quadraticCurveTo((a[0]+b[0])/2+nx*(widthA+widthB)*.30,(a[1]+b[1])/2+ny*(widthA+widthB)*.30,b[0]+nx*widthB/2,b[1]+ny*widthB/2);

const guideImageCache = new Map();
function getGuideImage(src) {
  if (!guideImageCache.has(src)) {
    const img = new Image();
    img.decoding = "async";
    img.src = src;
    guideImageCache.set(src, img);
  }
  return guideImageCache.get(src);

function drawRealisticGuideFrames(ctx, guide, now, w, h) {
  const frames = guide.imageFrames || [];
  if (!frames.length) return false;
  const tempo = guide.tempo || 3200;
  const phase = (now % tempo) / tempo;
  // Denser motion path with softer transitions to avoid a "cut" look.
  const path = [0,0,0,1,1,1,2,2,2,1,1,1];
  const scaled = phase * path.length;
  const index = Math.floor(scaled) % path.length;
  const nextIndex = (index + 1) % path.length;
  const local = scaled - Math.floor(scaled);
  const eased = local < .5 ? 4 * local * local * local : 1 - Math.pow(-2 * local + 2, 3) / 2;
  const aIndex = path[index], bIndex = path[nextIndex];
  const a = getGuideImage(frames[aIndex]);
  const b = getGuideImage(frames[bIndex]);
  const keyPos = [
    { x: -w * .018, y: -h * .008, s: 1.00 },
    { x: 0,         y:  h * .016, s: 1.028 },
    { x:  w * .018, y: -h * .008, s: 1.00 }
  ];
  const poseA = keyPos[aIndex] || keyPos[1];
  const poseB = keyPos[bIndex] || keyPos[1];
  const mix = (x,y,t)=>x+(y-x)*t;
  const driftA = { x: mix(poseA.x, poseB.x, eased) * .35, y: mix(poseA.y, poseB.y, eased) * .35, s: mix(poseA.s, poseB.s, eased) };
  const driftB = { x: mix(poseA.x, poseB.x, eased), y: mix(poseA.y, poseB.y, eased), s: mix(poseA.s, poseB.s, eased) };
  const draw = (img, alpha, transform, blurPx=0) => {
    if (!img.complete || !img.naturalWidth) return;
    const baseScale = Math.min(w / img.naturalWidth, h / img.naturalHeight) * 1.02;
    const scale = baseScale * transform.s;
    const dw = img.naturalWidth * scale;
    const dh = img.naturalHeight * scale;
    const x = (w - dw) / 2 + transform.x;
    const y = (h - dh) / 2 - h * .012 + transform.y;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    if ('filter' in ctx && blurPx > 0) ctx.filter = `blur(${blurPx}px)`;
    ctx.drawImage(img, x, y, dw, dh);
    ctx.restore();
  };
  draw(a, 1 - eased, driftA, 1.15 * eased);
  draw(b, eased, driftB, 1.15 * (1 - eased));
  // Ground vignette masks crop edges and integrates the rendered figure into the app.
  const vignette = ctx.createRadialGradient(w*.5,h*.55,Math.min(w,h)*.15,w*.5,h*.55,Math.max(w,h)*.68);
  vignette.addColorStop(0,'rgba(0,0,0,0)');
  vignette.addColorStop(.72,'rgba(0,0,0,.05)');
  vignette.addColorStop(1,'rgba(0,0,0,.52)');
  ctx.fillStyle=vignette; ctx.fillRect(0,0,w,h);
  return true;
}

function drawExerciseFigure(now=performance.now()) {
  const guide = activeGuideName ? exerciseGuides[activeGuideName] : null;
  const canvas = $("#guideCanvas");
  if (!guide || !canvas || $("#exerciseGuide").classList.contains("hidden")) return;
  const rect=canvas.getBoundingClientRect();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const pxW=Math.max(260,Math.round(rect.width*dpr));
  const pxH=Math.max(220,Math.round(rect.height*dpr));
  if (canvas.width!==pxW || canvas.height!==pxH) { canvas.width=pxW; canvas.height=pxH; }
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save(); ctx.scale(dpr,dpr);
  const w=rect.width,h=rect.height,pad=Math.min(w,h)*.05;
  if (guide.imageFrames) {
    drawRealisticGuideFrames(ctx, guide, now, w, h);
    ctx.restore();
    return;
  }
  const accent=guideColor("--accent","#39ff14");
  const accent2=guideColor("--accent2","#00e5ff");
  const cycle=(now%(guide.tempo||1800))/(guide.tempo||1800);
  let t=(1-Math.cos(cycle*Math.PI*2))/2;
  if (guide.staticHold) t=.5+.08*Math.sin(cycle*Math.PI*2);
  const smooth=t*t*(3-2*t);
  const pose={};
  Object.keys(guide.poseA).forEach(k=>{
    const n=mixPoint(guide.poseA[k],guide.poseB[k],smooth);
    const projectedY = .075 + (n[1]-.035)*.89;
    const depthShift = (n[0]-.5)*(n[1]-.52)*.055;
    pose[k]=[pad+(n[0]+depthShift)*(w-pad*2),pad+projectedY*(h-pad*2)];
  });
  // wall reference for wall sits
  if (guide.wall) {
    ctx.globalAlpha=.58;
    drawLine(ctx,[w*.24,h*.08],[w*.24,h*.91],5,"#777");
    ctx.globalAlpha=1;
  }
  // bench references for split squats and hip thrusts
  if (guide.bench==="rear") {
    ctx.globalAlpha=.62;
    drawLine(ctx,[w*.69,h*.78],[w*.90,h*.78],7,"#777");
    drawLine(ctx,[w*.72,h*.78],[w*.72,h*.89],5,"#666");
    drawLine(ctx,[w*.87,h*.78],[w*.87,h*.89],5,"#666");
    ctx.globalAlpha=1;
  }
  if (guide.bench==="upperBack") {
    ctx.globalAlpha=.62;
    drawLine(ctx,[w*.18,h*.72],[w*.43,h*.72],8,"#777");
    drawLine(ctx,[w*.21,h*.72],[w*.21,h*.88],5,"#666");
    drawLine(ctx,[w*.40,h*.72],[w*.40,h*.88],5,"#666");
    ctx.globalAlpha=1;
  }
  // small heel platforms for heels-elevated squats
  if (guide.heelBlocks) {
    ctx.globalAlpha=.72;
    ctx.fillStyle="#777";
    ctx.fillRect(w*.27,h*.89,w*.13,h*.035);
    ctx.fillRect(w*.60,h*.89,w*.13,h*.035);
    ctx.globalAlpha=1;
  }
  // floor / mat
  if (guide.floor) {
    ctx.globalAlpha=.55; drawLine(ctx,[w*.10,h*.88],[w*.92,h*.88],3,"#777"); ctx.globalAlpha=1;
  } else {
    ctx.save(); ctx.globalAlpha=.28; ctx.strokeStyle="#777"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(w*.18,h*.91); ctx.lineTo(w*.82,h*.91); ctx.lineTo(w*.94,h*.98); ctx.lineTo(w*.06,h*.98); ctx.closePath(); ctx.stroke(); ctx.restore();
  }
  // soft shadow
  ctx.beginPath(); ctx.ellipse(w*.52,h*.925,w*.24,h*.04,0,0,Math.PI*2); ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fill();
  const hip=[(pose.hl[0]+pose.hr[0])/2,(pose.hl[1]+pose.hr[1])/2];
  const shoulder=[(pose.sl[0]+pose.sr[0])/2,(pose.sl[1]+pose.sr[1])/2];
  const lineW=Math.max(5,Math.min(w,h)*.032);
  ctx.shadowColor=accent; ctx.shadowBlur=10;
  if (guide.enhancedHuman) {
    // More human three-quarter silhouette, viewed from slightly above.
    const rear="rgba(133,146,166,.66)", skin="#f1c7a5", near="#e9eef5";
    // Rear side first to establish depth.
    drawTaperedLimb(ctx,pose.sr,pose.er,lineW*1.45,lineW*1.12,rear,.82);
    drawTaperedLimb(ctx,pose.er,pose.wr,lineW*1.12,lineW*.82,rear,.82);
    drawTaperedLimb(ctx,pose.hr,pose.kr,lineW*2.05,lineW*1.55,rear,.82);
    drawTaperedLimb(ctx,pose.kr,pose.ar,lineW*1.55,lineW*1.02,rear,.82);
    drawHumanTorso(ctx,pose.sl,pose.sr,pose.hl,pose.hr,accent,accent2);
    // Pelvis / shorts with a natural anatomical taper.
    ctx.save(); ctx.fillStyle=accent2; ctx.globalAlpha=.92; ctx.beginPath();
    ctx.moveTo(pose.hl[0]-lineW*.35,pose.hl[1]-lineW*.18); ctx.lineTo(pose.hr[0]+lineW*.35,pose.hr[1]-lineW*.18);
    ctx.lineTo(pose.hr[0]+lineW*.15,pose.hr[1]+lineW*.78); ctx.quadraticCurveTo(hip[0],hip[1]+lineW*1.0,pose.hl[0]-lineW*.15,pose.hl[1]+lineW*.78); ctx.closePath(); ctx.fill(); ctx.restore();
    // Near arm and leg with tapered muscle mass.
    drawTaperedLimb(ctx,pose.sl,pose.el,lineW*1.62,lineW*1.20,near,1);
    drawTaperedLimb(ctx,pose.el,pose.wl,lineW*1.18,lineW*.82,skin,1);
    drawTaperedLimb(ctx,pose.hl,pose.kl,lineW*2.22,lineW*1.70,near,1);
    drawTaperedLimb(ctx,pose.kl,pose.al,lineW*1.65,lineW*1.03,skin,1);
    drawHand(ctx,pose.wl,lineW*.52,skin); drawHand(ctx,pose.wr,lineW*.46,skin,.84);
    // Neck, head, ear, nose and hairline make the figure read as human.
    drawTaperedLimb(ctx,pose.neck,shoulder,lineW*.88,lineW*1.05,skin,1);
    const headR=Math.max(11,Math.min(w,h)*.058);
    ctx.save(); ctx.translate(pose.head[0],pose.head[1]); ctx.rotate(-.16);
    ctx.fillStyle=skin; ctx.beginPath(); ctx.ellipse(0,0,headR*.82,headR,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#28313d"; ctx.beginPath(); ctx.arc(-headR*.10,-headR*.42,headR*.72,Math.PI,Math.PI*2); ctx.fill();
    ctx.fillStyle=skin; ctx.beginPath(); ctx.moveTo(headR*.70,-headR*.08); ctx.lineTo(headR*.98,headR*.05); ctx.lineTo(headR*.68,headR*.16); ctx.closePath(); ctx.fill();
    ctx.fillStyle="#252525"; ctx.beginPath(); ctx.arc(headR*.46,-headR*.15,headR*.075,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(80,45,35,.7)";ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(headR*.38,headR*.38);ctx.lineTo(headR*.65,headR*.34);ctx.stroke();ctx.restore();
    // Shoes and visible soles reinforce the elevated 3/4 camera.
    drawFoot(ctx,pose.ar,[pose.ar[0]+lineW*1.50,pose.ar[1]+lineW*.30],lineW*1.02,rear,.8);
    drawFoot(ctx,pose.al,[pose.al[0]+lineW*1.72,pose.al[1]+lineW*.28],lineW*1.10,"#f8f8f8",1);
    [pose.el,pose.kl].forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],lineW*.32,0,Math.PI*2);ctx.fillStyle=skin;ctx.fill();});
    if (guide.motionArrow==="vertical") drawMotionArrow(ctx,w*.82,h*.70,w*.82,h*.35,accent2);
    if (guide.motionArrow==="up") drawMotionArrow(ctx,w*.78,h*.42,w*.78,h*.13,accent2);
    if (guide.motionArrow==="hinge") drawMotionArrow(ctx,w*.73,h*.48,w*.58,h*.35,accent2);
    if (guide.motionArrow==="row") drawMotionArrow(ctx,w*.77,h*.66,w*.67,h*.43,accent2);
  } else {
    // Original lightweight stick figure for exercises not yet upgraded.
    drawLine(ctx,pose.neck,shoulder,lineW,accent);
    drawLine(ctx,shoulder,hip,lineW,accent);
    drawLine(ctx,pose.sl,pose.sr,lineW*.78,accent2);
    drawLine(ctx,pose.hl,pose.hr,lineW*.78,accent2);
    [["sl","el"],["el","wl"],["sr","er"],["er","wr"],["hl","kl"],["kl","al"],["hr","kr"],["kr","ar"]].forEach(([a,b],i)=>drawLine(ctx,pose[a],pose[b],lineW,i<4?accent2:accent));
    ctx.shadowBlur=0;
    Object.entries(pose).forEach(([key,p])=>{ if (key==="head") return; ctx.beginPath(); ctx.arc(p[0],p[1],lineW*.36,0,Math.PI*2); ctx.fillStyle="#f4f4f4"; ctx.fill(); });
    const headR=Math.max(10,Math.min(w,h)*.055);
    ctx.beginPath(); ctx.arc(pose.head[0],pose.head[1],headR,0,Math.PI*2); ctx.fillStyle="#f4f4f4"; ctx.fill(); ctx.lineWidth=3; ctx.strokeStyle=accent; ctx.stroke();

  if (guide.equipment==="dumbbells") {
    [pose.wl,pose.wr].forEach(p=>{
      drawLine(ctx,[p[0]-lineW*.8,p[1]],[p[0]+lineW*.8,p[1]],lineW*.42,"#fff");
      drawLine(ctx,[p[0]-lineW*.9,p[1]-lineW*.45],[p[0]-lineW*.9,p[1]+lineW*.45],lineW*.42,accent2);
      drawLine(ctx,[p[0]+lineW*.9,p[1]-lineW*.45],[p[0]+lineW*.9,p[1]+lineW*.45],lineW*.42,accent2);
    });
  }
  if (guide.equipment==="hipDumbbell") {
    const p=[hip[0],hip[1]-lineW*.25];
    drawLine(ctx,[p[0]-lineW*1.05,p[1]],[p[0]+lineW*1.05,p[1]],lineW*.46,"#fff");
    drawLine(ctx,[p[0]-lineW*1.15,p[1]-lineW*.52],[p[0]-lineW*1.15,p[1]+lineW*.52],lineW*.45,accent2);
    drawLine(ctx,[p[0]+lineW*1.15,p[1]-lineW*.52],[p[0]+lineW*1.15,p[1]+lineW*.52],lineW*.45,accent2);
  }
  if (guide.equipment==="singleDumbbell") {
    const p=pose.wr;
    drawLine(ctx,[p[0]-lineW*.8,p[1]],[p[0]+lineW*.8,p[1]],lineW*.42,"#fff");
    drawLine(ctx,[p[0]-lineW*.9,p[1]-lineW*.45],[p[0]-lineW*.9,p[1]+lineW*.45],lineW*.42,accent2);
    drawLine(ctx,[p[0]+lineW*.9,p[1]-lineW*.45],[p[0]+lineW*.9,p[1]+lineW*.45],lineW*.42,accent2);
  }

    const p=[(pose.wl[0]+pose.wr[0])/2,(pose.wl[1]+pose.wr[1])/2+lineW*.7];
    ctx.beginPath(); ctx.arc(p[0],p[1],lineW*.9,0,Math.PI*2); ctx.fillStyle=accent2; ctx.fill();

function resolveGuideName(seg) {
  if (seg?.guideName && exerciseGuides[seg.guideName]) return seg.guideName;
  if (seg?.name && exerciseGuides[seg.name]) return seg.name;
  return null;
}
function updateExerciseGuide(seg) {
  const mode=$("#exerciseGuideMode").value || "always";
  const guideName=resolveGuideName(seg);
  const preparatory=seg?.type==="prep" || seg?.type==="longRest";
  const show=mode!=="off" && !!guideName && (mode==="always" || preparatory);
  const panel=$("#exerciseGuide");
  panel.classList.toggle("hidden",!show);
  if (!show) { activeGuideName=null; return; }
  activeGuideName=guideName;
  activeGuideDimmed=seg.type!=="work";
  panel.classList.toggle("guide-dimmed",activeGuideDimmed);
  const guide=exerciseGuides[guideName];
  if (guide.imageFrames) guide.imageFrames.forEach(getGuideImage);
  $("#guideTitle").textContent=preparatory ? `Siguiente: ${guide.title}` : guide.title;
  $("#guideCues").innerHTML=guide.cues.map(c=>`<li>${c}</li>`).join("");
  drawExerciseFigure();
}

function escapeOption(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function blockTemplate(i, data={}) {
  const defaultName = `Ejercicio ${i+1}`;
  const name = data.name || defaultName;
  const workMode = data.workMode === "count" ? "count" : "time";
  const work = +data.work || (i === 0 ? 40 : 45);
  const count = +data.count || 8;
  const shortRest = +data.shortRest || (i === 0 ? 15 : 10);
  const longRest = +data.longRest || 60;
  const reps = [3,4,5].includes(+data.reps) ? +data.reps : 3;
  const isKnownExercise = exerciseOptions.includes(name);
  const savedCustomOption = name !== defaultName && !isKnownExercise
    ? `<option value="${escapeOption(name)}" selected>${escapeOption(name)} · Guardado</option>`
    : "";
  const genericOption = `<option value="${escapeOption(defaultName)}" ${name===defaultName?"selected":""}>${escapeOption(defaultName)}</option>`;
  const groupedOptions = Object.entries(exerciseGroups).map(([groupLabel, options]) => `
    <optgroup label="${escapeOption(groupLabel)}">
      ${options.map(option => `<option value="${escapeOption(option)}" ${option===name?"selected":""}>${escapeOption(option)}</option>`).join("")}
    </optgroup>`).join("");
  const nameOptions = `${savedCustomOption}${genericOption}${groupedOptions}`;
  return `
  <div class="card workout-block">
    <div class="block-title">
      <select class="name" aria-label="Ejercicio del bloque">
        ${nameOptions}
      </select>
      <button class="danger remove">Eliminar</button>
    </div>
    <div class="grid">
      <div><label>Medición del trabajo</label>
        <select class="workMode">
          <option value="time" ${workMode==="time"?"selected":""}>Tiempo — segundos</option>
          <option value="count" ${workMode==="count"?"selected":""}>Cantidad — número de veces</option>
        </select>
        <div class="mode-note">En modo cantidad, cada repetición dura automáticamente 2 segundos. Puedes terminar la serie antes con un solo toque.</div>
      </div>
      <div class="timeWorkField"><label>Trabajo por repetición</label>
        <select class="work">
          ${[20,30,40,45,50,60,75,90,120].map(v=>`<option value="${v}" ${v==work?"selected":""}>${v} s</option>`).join("")}
        </select>
      </div>
      <div class="countWorkField"><label>Cantidad por repetición</label>
        <select class="count">
          ${[5,6,8,10,12,15,20,25,30].map(v=>`<option value="${v}" ${v==count?"selected":""}>${v} veces</option>`).join("")}
        </select>
      </div>
      <div><label>Repeticiones del bloque</label>
        <select class="reps">
          ${[3,4,5].map(v=>`<option value="${v}" ${v==reps?"selected":""}>${v}</option>`).join("")}
        </select>
      </div>
      <div><label>Descanso entre repeticiones</label>
        <select class="shortRest">
          <option value="10" ${shortRest==10?"selected":""}>10 s</option>
          <option value="15" ${shortRest==15?"selected":""}>15 s</option>
        </select>
      </div>
      <div><label>Descanso al terminar bloque</label>
        <select class="longRest">
          ${[40,45,50,60].map(v=>`<option value="${v}" ${v==longRest?"selected":""}>${v} s</option>`).join("")}
        </select>
      </div>
    </div>
  </div>`;
}

function syncBlockMode(block) {
  const isCount = block.querySelector(".workMode").value === "count";
  block.querySelector(".timeWorkField").classList.toggle("hidden", isCount);
  block.querySelector(".countWorkField").classList.toggle("hidden", !isCount);
}

function renumberGenericBlocks() {
  document.querySelectorAll(".workout-block").forEach((block, i) => {
    const select = block.querySelector(".name");
    const generic = [...select.options].find(option => /^Ejercicio \d+$/.test(option.value));
    if (!generic) return;
    const wasGeneric = select.value === generic.value;
    const newName = `Ejercicio ${i+1}`;
    generic.value = newName;
    generic.textContent = newName;
    if (wasGeneric) select.value = newName;
  });
}

function updateAddBlockState() {
  const count = document.querySelectorAll(".workout-block").length;
  const button = $("#addBlock");
  button.disabled = count >= 10;
  button.textContent = count >= 10 ? "Máximo de 10 bloques" : "+ Añadir bloque";
}

function addBlock(data) {
  const count = document.querySelectorAll(".workout-block").length;
  if (count >= 10) return;
  blocksEl.insertAdjacentHTML("beforeend", blockTemplate(count, data));
  bindBlocks();
  document.querySelectorAll(".workout-block").forEach(syncBlockMode);
  updateAddBlockState();
  updateEstimate();
}

function bindBlocks() {
  document.querySelectorAll(".remove").forEach(btn => btn.onclick = () => {
    if (document.querySelectorAll(".workout-block").length <= 1) return;
    btn.closest(".workout-block").remove();
    renumberGenericBlocks();
    updateAddBlockState();
    updateEstimate();
  });
  document.querySelectorAll(".workout-block").forEach(block => {
    block.querySelectorAll("input,select").forEach(el => {
      el.oninput = () => {
        if (el.classList.contains("workMode")) syncBlockMode(block);
        updateEstimate();
      };
    });
  });
}

function getConfig() {
  return [...document.querySelectorAll(".workout-block")].map(el => ({
    name: el.querySelector(".name").value.trim() || "Ejercicio",
    workMode: el.querySelector(".workMode").value === "count" ? "count" : "time",
    work: +el.querySelector(".work").value,
    count: +el.querySelector(".count").value,
    reps: +el.querySelector(".reps").value,
    shortRest: +el.querySelector(".shortRest").value,
    longRest: +el.querySelector(".longRest").value
  }));
}

function buildTimeline() {
  const cfg = getConfig();
  const rounds = +$("#rounds").value;
  const out = [{type:"prep", name:"Prepárate", seconds:+$("#prep").value, plannedSeconds:+$("#prep").value, round:1, rep:0, block:0, guideName:cfg[0]?.name || null}];
  for (let r=1; r<=rounds; r++) {
    cfg.forEach((b, bi) => {
      for (let rep=1; rep<=b.reps; rep++) {
        const countMode = b.workMode === "count";
        const plannedSeconds = countMode ? b.count * COUNT_ESTIMATED_SECONDS_PER_REP : b.work;
        out.push({
          type:"work", name:b.name, guideName:b.name,
          workMode:b.workMode, seconds:plannedSeconds, plannedSeconds,
          targetCount:countMode ? b.count : null,
          round:r, rep, reps:b.reps, block:bi+1
        });
        if (rep < b.reps) out.push({type:"rest", name:"Descanso corto", guideName:b.name, seconds:b.shortRest, plannedSeconds:b.shortRest, round:r, rep, reps:b.reps, block:bi+1});
      }
      const isVeryLast = r===rounds && bi===cfg.length-1;
      if (!isVeryLast) out.push({type:"longRest", name:"Recuperación", guideName:null, seconds:b.longRest, plannedSeconds:b.longRest, round:r, rep:b.reps, reps:b.reps, block:bi+1});
    });
  }
  out.push({type:"done", name:"Rutina completada", seconds:1, plannedSeconds:0, round:rounds, rep:0, reps:0, block:cfg.length});
  for (let i=0;i<out.length;i++) {
    if (out[i].type!=="prep" && out[i].type!=="longRest") continue;
    const nextWork=out.slice(i+1).find(seg=>seg.type==="work" && exerciseGuides[seg.name]);
    if (nextWork) out[i].guideName=nextWork.name;
  }
  return out;
}

function prepareTimelineMetrics() {
  segmentOffsetsMs = [];
  segmentWeightsMs = [];
  hasCountSegments = timeline.some(seg => seg.type === "work" && seg.workMode === "count");
  let running = 0;
  timeline.forEach(seg => {
    const weight = seg.type === "done" ? 0 : (seg.plannedSeconds ?? seg.seconds) * 1000;
    segmentOffsetsMs.push(running);
    segmentWeightsMs.push(weight);
    running += weight;
  });
  totalDurationMs = running;
}

function formatClock(ms) {
  const totalSeconds = Math.max(0, Math.round(ms / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;
}

function getActualWorkoutElapsedMs() {
  if (!workoutStartedAt) return 0;
  const now = performance.now();
  const activePause = paused && pausedStartedAt ? now - pausedStartedAt : 0;
  return Math.max(0, now - workoutStartedAt - totalPausedMs - activePause);
}

function updateSessionProgress(seg) {
  if (!totalDurationMs) return;
  const segmentWeight = segmentWeightsMs[index] || 0;
  let segmentProgress = 0;
  if (seg.type === "work" && seg.workMode === "count") {
    segmentProgress = seg.targetCount ? currentCount / seg.targetCount : 0;
  } else {
    segmentProgress = seg.seconds ? (seg.seconds * 1000 - remainingMs) / (seg.seconds * 1000) : 1;
  }
  segmentProgress = Math.max(0, Math.min(1, segmentProgress));
  const weightedElapsed = Math.min(totalDurationMs, (segmentOffsetsMs[index] || 0) + segmentWeight * segmentProgress);
  const progress = Math.max(0, Math.min(1, weightedElapsed / totalDurationMs));
  $("#sessionProgressFill").style.width = `${progress * 100}%`;
  if (hasCountSegments) {
    $("#sessionElapsed").textContent = `Transcurrido ${formatClock(getActualWorkoutElapsedMs())}`;
    $("#sessionRemaining").textContent = `Progreso ${Math.round(progress * 100)}%`;
  } else {
    $("#sessionElapsed").textContent = formatClock(weightedElapsed);
    $("#sessionRemaining").textContent = `Restante ${formatClock(totalDurationMs - weightedElapsed)}`;
  }
}

function updateEstimate() {
  const cfg = getConfig();
  const rounds = +$("#rounds").value;
  const estimateWork = b => b.workMode === "count" ? b.count * COUNT_ESTIMATED_SECONDS_PER_REP : b.work;
  let perRound = cfg.reduce((sum,b)=>sum + b.reps*estimateWork(b) + (b.reps-1)*b.shortRest + b.longRest, 0);
  perRound -= cfg.length ? cfg[cfg.length-1].longRest : 0;
  const betweenRounds = rounds > 1 && cfg.length ? (rounds-1)*cfg[cfg.length-1].longRest : 0;
  const total = +$("#prep").value + perRound*rounds + betweenRounds;
  const hybrid = cfg.some(b => b.workMode === "count");
  $("#estimate").textContent = `Duración ${hybrid ? "estimada" : "total"}: ${Math.floor(total/60)} min ${total%60} s` +
    (hybrid ? ` · Para calcularla, cada repetición dura ${COUNT_ESTIMATED_SECONDS_PER_REP} s.` : "");
}

function applyTheme(type) {
  const theme = themes[$("#theme").value];
  const colors = type === "work" ? theme.work : theme.rest;
  document.documentElement.style.setProperty("--accent", colors[0]);
  document.documentElement.style.setProperty("--accent2", colors[1]);
}

function chooseVisual(seg) {
  const selected = $("#visual").value;
  if (selected !== "alternate") return selected;
  const order = ["horizontal","vertical","circle"];
  return order[(seg.block + seg.rep + seg.round) % 3];
}

function renderVisual(progress, seg) {
  currentVisual = chooseVisual(seg);
  const p = Math.max(0, Math.min(1, progress));
  let html = "";
  if (currentVisual === "horizontal") {
    html = `<div class="bar-h"><div class="fill" style="width:${p*100}%"></div></div>`;
  } else if (currentVisual === "vertical") {
    html = `<div class="bar-v"><div class="fill" style="height:${p*100}%"></div></div>`;
  } else {
    html = `<div class="circle" style="--deg:${p*360}deg"></div>`;
  }
  $("#visualContainer").innerHTML = html;
}

function vibrate(pattern=[80]) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function ensureAudioContext() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!audioContext && Ctx) audioContext = new Ctx();
    return audioContext;
  } catch(e) {
    return null;
  }
}

function unlockAudio() {
  const ctx = ensureAudioContext();
  if (ctx?.state === "suspended") ctx.resume().catch(()=>{});

  allCountdownAudios.forEach(audio => {
    try {
      audio.pause();
      audio.currentTime = 0;
      audio.volume = 0.001;
      const attempt = audio.play();
      if (attempt?.then) {
        attempt.then(() => {
          audio.pause();
          audio.currentTime = 0;
          audio.volume = 1;
          audioUnlocked = true;
        }).catch(() => {});
      }
    } catch(e) {}
  });

  if (ctx) {
    try {
      const buffer = ctx.createBuffer(1, 1, 22050);
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);
      source.start(0);
      audioUnlocked = true;
    } catch(e) {}
  }
}

function webAudioCountdown(style="classic", isFinalSecond=false) {
  const ctx = ensureAudioContext();
  if (!ctx) return;
  const play = () => {
    try {
      const start = ctx.currentTime + 0.005;
      const makeTone = (type, f0, f1, duration, delay=0, volume=.18) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f0, start + delay);
        if (f1) osc.frequency.exponentialRampToValueAtTime(f1, start + delay + duration);
        gain.gain.setValueAtTime(volume, start + delay);
        gain.gain.exponentialRampToValueAtTime(.001, start + delay + duration);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(start + delay); osc.stop(start + delay + duration);
      };
      if (style === "classic") {
        makeTone("sine", isFinalSecond ? 990 : 720, null, isFinalSecond ? .30 : .18, 0, .20);
        makeTone("sine", isFinalSecond ? 1980 : 1440, null, isFinalSecond ? .24 : .14, .008, .07);
      } else if (style === "chime") {
        makeTone("sine", isFinalSecond ? 1046 : 880, null, isFinalSecond ? .38 : .26, 0, .18);
        makeTone("sine", isFinalSecond ? 1568 : 1320, null, isFinalSecond ? .34 : .22, .015, .09);
        if (isFinalSecond) makeTone("sine", 1318, null, .23, .18, .13);
      } else if (style === "sport") {
        makeTone("square", isFinalSecond ? 560 : 690, isFinalSecond ? 930 : 1180, isFinalSecond ? .20 : .12, 0, .14);
        if (isFinalSecond) makeTone("triangle", 930, 1280, .10, .105, .11);
      } else {
        makeTone("sine", isFinalSecond ? 1080 : 920, isFinalSecond ? 1450 : 1180, isFinalSecond ? .11 : .15, 0, .20);
        if (isFinalSecond) makeTone("sine", 1250, 1700, .11, .115, .18);
      }
    } catch(e) {}
  };
  if (ctx.state === "suspended") ctx.resume().then(play).catch(()=>{});
  else play();
}

function playCountdownSound(isFinalSecond=false) {
  const style = $("#countdownSound").value || "classic";
  const pair = countdownAudios[style] || countdownAudios.classic;
  const audio = isFinalSecond ? pair.final : pair.normal;
  try {
    audio.pause();
    audio.currentTime = 0;
    audio.volume = 1;
    const attempt = audio.play();
    if (attempt?.catch) attempt.catch(() => webAudioCountdown(style, isFinalSecond));
  } catch(e) {
    webAudioCountdown(style, isFinalSecond);
  }
}

function beep(freq=760, duration=.12, volume=.12) {
  const ctx = ensureAudioContext();
  if (!ctx) return;
  const play = () => {
    try {
      const now = ctx.currentTime + .005;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + duration);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + duration);
    } catch(e) {}
  };
  if (ctx.state === "suspended") ctx.resume().then(play).catch(()=>{});
  else play();
}

function playCountdownAlert(seg, seconds) {
  const workCountdown = seg.type === "work" && seconds >= 1 && seconds <= 5;
  const restCountdown = (seg.type === "rest" || seg.type === "longRest") && seconds >= 1 && seconds <= 3;
  if (!(workCountdown || restCountdown) || seconds === lastCountdownSecond) return;
  lastCountdownSecond = seconds;
  playCountdownSound(seconds === 1);
  vibrate(seconds === 1 ? [55,35,55] : [45]);
}



function registerInteraction() {
  lastInteractionAt = performance.now();
  $("#timer").classList.remove("controls-hidden");
}

function updateControlsVisibility() {
  if (!workoutActive) {
    $("#timer").classList.remove("controls-hidden");
    return;
  }
  const shouldHide = performance.now() - lastInteractionAt >= 5000;
  $("#timer").classList.toggle("controls-hidden", shouldHide);
}

async function requestWakeLock() {
  if (!workoutActive || document.visibilityState !== "visible" || !("wakeLock" in navigator)) return;
  try {
    if (wakeLock && !wakeLock.released) return;
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch(e) {
    wakeLock = null;
  }
}

async function releaseWakeLock() {
  try {
    if (wakeLock && !wakeLock.released) await wakeLock.release();
  } catch(e) {}
  wakeLock = null;
}

function showSegment(reset=true) {
  const seg = timeline[index];
  if (!seg || seg.type === "done") return finish();
  const countMode = seg.type === "work" && seg.workMode === "count";
  $("#timer").classList.toggle("count-mode", countMode);
  $("#countActions").classList.toggle("hidden", !countMode);
  $("#countStatus").classList.toggle("hidden", !countMode);
  applyTheme(seg.type);
  $("#phase").textContent =
    countMode ? "Cantidad" :
    seg.type==="work" ? "Trabajo" :
    seg.type==="prep" ? "Preparación" : "Descanso";
  $("#exerciseName").textContent = seg.name;
  $("#meta").textContent = seg.type==="prep" ? "" :
    `Ronda ${seg.round}/${$("#rounds").value} · Bloque ${seg.block}/${getConfig().length}` +
    (seg.type==="work" ? ` · Repetición ${seg.rep}/${seg.reps}` + (countMode ? ` · Objetivo ${seg.targetCount}` : "") : "");
  updateExerciseGuide(seg);
  if (reset) {
    currentCount = 0;
    remainingMs = seg.seconds * 1000;
    segmentEnd = performance.now() + remainingMs;
    lastCountdownSecond = null;
    beep(seg.type==="work" ? 900 : 520);
    vibrate(seg.type==="work" ? [100,50,100] : [70]);
  }
  updateFrame();
}

function updateFrame() {
  const seg = timeline[index];
  const countMode = seg.type === "work" && seg.workMode === "count";
  if (countMode) {
    const elapsedMs = Math.max(0, seg.seconds * 1000 - remainingMs);
    currentCount = Math.min(seg.targetCount, Math.floor(elapsedMs / (COUNT_ESTIMATED_SECONDS_PER_REP * 1000)));
    const remainingCount = Math.max(0, seg.targetCount - currentCount);
    $("#seconds").textContent = remainingCount;
    $("#countStatus").textContent = `${currentCount}/${seg.targetCount} completadas · 2 segundos por repetición`;
    $("#countButton").textContent = "✓ Completar cantidad ahora";
    renderVisual(seg.seconds ? remainingMs / (seg.seconds * 1000) : 0, seg);
  } else {
    const seconds = Math.max(0, Math.ceil(remainingMs/1000));
    $("#seconds").textContent = seconds;
    playCountdownAlert(seg, seconds);
    renderVisual(remainingMs/(seg.seconds*1000), seg);
  }
  drawExerciseFigure();
  updateSessionProgress(seg);
}

function completeCountMovement() {
  const seg = timeline[index];
  if (!workoutActive || paused || !seg || seg.type !== "work" || seg.workMode !== "count") return;
  currentCount = seg.targetCount;
  remainingMs = 0;
  vibrate([70,40,90]);
  beep(1050,.18);
  updateFrame();
  $("#countButton").disabled = true;
  setTimeout(() => {
    $("#countButton").disabled = false;
    if (timeline[index] === seg && workoutActive) {
      index++;
      showSegment(true);
    }
  }, 220);
}

function tick() {
  updateControlsVisibility();
  if (paused) return;
  const seg = timeline[index];
  remainingMs = Math.max(0, segmentEnd - performance.now());
  updateFrame();
  if (remainingMs <= 0) {
    index++;
    showSegment(true);
  }
}

async function startWorkout() {
  unlockAudio();
  const startButton = $("#start");
  startButton.disabled = true;
  const originalStartText = startButton.textContent;
  startButton.textContent = originalStartText;
  startButton.disabled = false;
  timeline = buildTimeline();
  index = 0;
  paused = false;
  pausedStartedAt = 0;
  totalPausedMs = 0;
  workoutStartedAt = performance.now();
  workoutActive = true;
  unlockAudio();
  prepareTimelineMetrics();
  $("#sessionProgressFill").style.width = "0%";
  $("#sessionElapsed").textContent = hasCountSegments ? "Transcurrido 00:00" : "00:00";
  $("#sessionRemaining").textContent = hasCountSegments ? "Progreso 0%" : `Restante ${formatClock(totalDurationMs)}`;
  $("#pause").textContent = "Pausa";
  $("#setup").classList.add("hidden");
  $("#timer").classList.remove("hidden");
  document.body.requestFullscreen?.().catch(()=>{});
  requestWakeLock();
  registerInteraction();
  showSegment(true);
  clearInterval(interval);
  interval = setInterval(tick, 50);
}

function finish() {
  clearInterval(interval);
  workoutActive = false;
  releaseWakeLock();
  $("#timer").classList.remove("controls-hidden","count-mode");
  $("#countActions").classList.add("hidden");
  $("#countStatus").classList.add("hidden");
  $("#sessionProgressFill").style.width = "100%";
  $("#sessionElapsed").textContent = hasCountSegments ? `Transcurrido ${formatClock(getActualWorkoutElapsedMs())}` : formatClock(totalDurationMs);
  $("#sessionRemaining").textContent = hasCountSegments ? "Progreso 100%" : "Restante 00:00";
  beep(1100,.35); vibrate([150,80,150,80,250]);
  $("#exerciseGuide").classList.add("hidden");
  activeGuideName = null;
  $("#phase").textContent = "Finalizado";
  $("#exerciseName").textContent = "Rutina completada";
  $("#seconds").textContent = "✓";
  $("#meta").textContent = "";
  renderVisual(1,{block:0,rep:0,round:0,type:"work"});
}

$("#addBlock").onclick = () => addBlock();
$("#start").onclick = startWorkout;
$("#rounds").onchange = updateEstimate;
$("#prep").onchange = updateEstimate;
$("#exerciseGuideMode").onchange = () => { if (workoutActive && timeline[index]) updateExerciseGuide(timeline[index]); };
$("#saveRoutine").onclick = () => {
  localStorage.setItem("visualTimerConfig", JSON.stringify({
    blocks:getConfig(), theme:$("#theme").value, visual:$("#visual").value,
    rounds:$("#rounds").value, prep:$("#prep").value, countdownSound:$("#countdownSound").value,
    exerciseGuideMode:$("#exerciseGuideMode").value
  }));
  $("#saveRoutine").textContent = "Guardado ✓";
  setTimeout(()=>$("#saveRoutine").textContent="Guardar configuración",1200);
};
$("#pause").onclick = () => {
  registerInteraction();
  unlockAudio();
  paused = !paused;
  if (paused) {
    pausedStartedAt = performance.now();
    const seg = timeline[index];
    remainingMs = Math.max(0, segmentEnd - performance.now());
    $("#pause").textContent = "Continuar";
  } else {
    if (pausedStartedAt) totalPausedMs += performance.now() - pausedStartedAt;
    pausedStartedAt = 0;
    const seg = timeline[index];
    segmentEnd = performance.now() + remainingMs;
    $("#pause").textContent = "Pausa";
  }
};
$("#next").onclick = () => { registerInteraction(); unlockAudio(); index = Math.min(index+1,timeline.length-1); showSegment(true); };
$("#back").onclick = () => { registerInteraction(); unlockAudio(); index = Math.max(index-1,0); showSegment(true); };
$("#exit").onclick = () => {
  registerInteraction();
  clearInterval(interval);
  workoutActive = false;
  releaseWakeLock();
  $("#timer").classList.remove("controls-hidden","count-mode");
  $("#countActions").classList.add("hidden");
  $("#countStatus").classList.add("hidden");
  $("#exerciseGuide").classList.add("hidden");
  activeGuideName = null;
  $("#timer").classList.add("hidden");
  $("#setup").classList.remove("hidden");
  document.exitFullscreen?.();
};

$("#countButton").addEventListener("click", completeCountMovement);
$("#countButton").addEventListener("touchstart", event => event.stopPropagation(), {passive:true});
$("#countButton").addEventListener("mousedown", event => event.stopPropagation());

$("#timer").addEventListener("touchstart", registerInteraction, {passive:true});
$("#timer").addEventListener("mousedown", registerInteraction, {passive:true});
$("#timer").addEventListener("keydown", registerInteraction);
$("#testSound").onclick = () => {
  unlockAudio();
  $("#testSound").textContent = "🔊 3 · 2 · 1";
  setTimeout(() => playCountdownSound(false), 160);
  setTimeout(() => playCountdownSound(false), 760);
  setTimeout(() => playCountdownSound(true), 1360);
  setTimeout(() => $("#testSound").textContent = "🔊 Probar 3–2–1", 2050);
};
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && workoutActive) {
    requestWakeLock();
  }
});

const saved = JSON.parse(localStorage.getItem("visualTimerConfig") || "null");
if (saved) {
  saved.blocks.forEach(addBlock);
  $("#theme").value=saved.theme||"cardio";
  $("#visual").value=saved.visual||"alternate";
  $("#rounds").value=saved.rounds||"2";
  $("#prep").value=saved.prep||"10";
  $("#countdownSound").value=(saved.countdownSound && saved.countdownSound!=="digital") ? saved.countdownSound : "classic";
  $("#exerciseGuideMode").value=saved.exerciseGuideMode||"always";
} else {
  addBlock({name:"Ejercicio 1",workMode:"time",work:40,count:8,reps:3,shortRest:15,longRest:60});
  addBlock({name:"Ejercicio 2",workMode:"time",work:45,count:8,reps:3,shortRest:10,longRest:60});
}
document.querySelectorAll(".workout-block").forEach(syncBlockMode);
updateAddBlockState();
updateEstimate();
</script>
