<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Visual Timer" />
  <title>Visual Workout Timer</title>
  <style>
    :root {
      --bg:#000;
      --fg:#fff;
      --accent:#39ff88;
      --accent2:#00d4ff;
      --muted:#8b8b8b;
      --panel:#111;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; width:100%; height:100%; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif; }
    body { min-height:100dvh; overflow:hidden; }
    button, select, input { font:inherit; }
    button { cursor:pointer; }
    .screen { width:100%; height:100dvh; padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); }
    .hidden { display:none !important; }

    #setup { overflow:auto; background:linear-gradient(180deg,#090909,#000); }
    h1 { margin:8px 0 2px; font-size:clamp(28px,6vw,46px); }
    .sub { color:#aaa; margin-bottom:18px; }
    .toolbar, .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .card { background:#111; border:1px solid #252525; border-radius:18px; padding:14px; margin:12px 0; }
    .block-title { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .block-title input { flex:1; min-width:0; }
    label { display:block; color:#bbb; font-size:13px; margin-bottom:5px; }
    input, select {
      width:100%; color:white; background:#1b1b1b; border:1px solid #333; border-radius:12px; padding:11px 12px;
    }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:12px; }
    .primary { background:#fff; color:#000; border:0; border-radius:14px; padding:13px 18px; font-weight:800; }
    .secondary { background:#1d1d1d; color:#fff; border:1px solid #333; border-radius:14px; padding:12px 16px; }
    .danger { background:#241010; color:#ff8e8e; border:1px solid #5b2424; border-radius:12px; padding:9px 12px; }
    #estimate { margin:14px 0; font-weight:700; color:#ddd; }

    #timer { position:relative; background:#000; display:flex; flex-direction:column; justify-content:space-between; }
    .timer-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; z-index:3; }
    .phase { font-size:clamp(18px,3vw,28px); font-weight:900; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
    .meta { color:#aaa; font-size:clamp(13px,2vw,18px); text-align:right; }
    .visual-wrap { flex:1; display:grid; place-items:center; min-height:0; padding:10px; }
    .seconds {
      position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; z-index:2;
      font-size:clamp(76px,24vw,260px); font-weight:1000; line-height:1; font-variant-numeric:tabular-nums;
      text-shadow:0 2px 22px rgba(0,0,0,.65);
    }
    .bar-h, .bar-v { overflow:hidden; background:#151515; border:1px solid #2a2a2a; }
    .bar-h { width:min(88vw,1200px); height:clamp(85px,22vh,220px); border-radius:32px; }
    .bar-v { width:clamp(100px,22vw,260px); height:min(62vh,700px); border-radius:32px; display:flex; align-items:flex-end; }
    .fill { width:100%; height:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); transition:width .08s linear,height .08s linear; }
    .circle { width:min(62vw,62vh,620px); aspect-ratio:1; border-radius:50%; background:conic-gradient(var(--accent) 0deg,var(--accent2) var(--deg),#161616 var(--deg)); display:grid; place-items:center; box-shadow:0 0 38px color-mix(in srgb, var(--accent) 35%, transparent); }
    .circle::after { content:""; width:68%; aspect-ratio:1; border-radius:50%; background:#000; border:1px solid #292929; }
    .timer-bottom { position:relative; z-index:5; display:flex; flex-direction:column; gap:10px; }
    .session-progress {
      width:100%; padding:0 2px;
      transition:opacity .25s ease;
    }
    .session-progress-labels {
      display:flex; justify-content:space-between; gap:12px;
      margin-bottom:6px; color:#b7b7b7; font-size:12px;
      font-variant-numeric:tabular-nums;
    }
    .session-progress-track {
      height:9px; width:100%; overflow:hidden;
      background:#202020; border:1px solid #343434; border-radius:999px;
    }
    .session-progress-fill {
      width:0%; height:100%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:999px;
      transition:width .08s linear;
    }
    .timer-controls {
      display:flex; justify-content:center; gap:12px; z-index:4;
      opacity:1; visibility:visible; transform:translateY(0);
      transition:opacity .28s ease, transform .28s ease, visibility 0s linear;
    }
    #timer.controls-hidden .timer-controls {
      opacity:0 !important;
      visibility:hidden;
      transform:translateY(14px);
      pointer-events:none;
      transition:opacity .28s ease, transform .28s ease, visibility 0s linear .28s;
    }
    .timer-controls button { min-width:110px; }
    .big-start { font-size:18px; }

    @media (orientation:landscape) {
      #timer { padding-top:max(10px,env(safe-area-inset-top)); padding-bottom:max(10px,env(safe-area-inset-bottom)); }
      .visual-wrap { padding:0 10px; }
      .seconds { font-size:clamp(84px,22vh,240px); }
      .bar-h { width:min(82vw,1400px); height:32vh; }
      .bar-v { height:60vh; width:17vw; }
      .circle { width:min(58vh,540px); }
      .timer-bottom { gap:7px; }
      .session-progress-labels { margin-bottom:4px; font-size:11px; }
      .session-progress-track { height:8px; }
      .timer-controls { position:absolute; right:max(12px,env(safe-area-inset-right)); bottom:calc(max(12px,env(safe-area-inset-bottom)) + 24px); opacity:.78; }
      .timer-controls button { min-width:auto; padding:10px 13px; }
    }
  </style>
</head>
<body>
  <section id="setup" class="screen">
    <h1>Visual Workout Timer</h1>
    <div class="sub">Crea hasta 6 bloques, 3 repeticiones por bloque. <strong>v1.2</strong></div>

    <div class="card">
      <div class="grid">
        <div>
          <label>Tema</label>
          <select id="theme">
            <option value="yoga">Yoga — pacífico</option>
            <option value="cardio" selected>Cardio — fluorescente</option>
            <option value="boxing">Pesas / boxing</option>
          </select>
        </div>
        <div>
          <label>Visualización</label>
          <select id="visual">
            <option value="alternate" selected>Alternar automáticamente</option>
            <option value="horizontal">Barra horizontal</option>
            <option value="vertical">Barra vertical</option>
            <option value="circle">Círculo</option>
          </select>
        </div>
        <div>
          <label>Rondas completas</label>
          <select id="rounds">
            <option>1</option><option selected>2</option><option>3</option>
          </select>
        </div>
        <div>
          <label>Preparación inicial</label>
          <select id="prep">
            <option value="5">5 segundos</option>
            <option value="10" selected>10 segundos</option>
            <option value="15">15 segundos</option>
          </select>
        </div>
      </div>
    </div>

    <div id="blocks"></div>

    <div class="toolbar">
      <button id="addBlock" class="secondary">+ Añadir bloque</button>
      <button id="saveRoutine" class="secondary">Guardar configuración</button>
      <button id="testSound" class="secondary">🔊 Probar sonido</button>
    </div>
    <div id="estimate"></div>
    <button id="start" class="primary big-start">Comenzar rutina</button>
  </section>

  <section id="timer" class="screen hidden">
    <div class="timer-top">
      <div>
        <div id="phase" class="phase">Preparación</div>
        <div id="exerciseName">Prepárate</div>
      </div>
      <div id="meta" class="meta"></div>
    </div>

    <div class="visual-wrap">
      <div id="visualContainer"></div>
      <div id="seconds" class="seconds">10</div>
    </div>

    <div class="timer-bottom">
      <div class="session-progress" aria-label="Progreso total de la rutina">
        <div class="session-progress-labels">
          <span id="sessionElapsed">00:00</span>
          <span id="sessionRemaining">Restante 00:00</span>
        </div>
        <div class="session-progress-track">
          <div id="sessionProgressFill" class="session-progress-fill"></div>
        </div>
      </div>
      <div class="timer-controls">
        <button id="back" class="secondary">◀ Atrás</button>
        <button id="pause" class="primary">Pausa</button>
        <button id="next" class="secondary">Siguiente ▶</button>
        <button id="exit" class="danger">Salir</button>
      </div>
    </div>
  </section>

const themes = {
  yoga:   { work:["#90c8ac","#d8c8a8"], rest:["#788b9b","#b8a7c9"] },
  cardio: { work:["#39ff14","#00e5ff"], rest:["#ff2bd6","#7a5cff"] },
  boxing: { work:["#ff3b30","#ff9500"], rest:["#ffd60a","#ff6b00"] }
};

function blockTemplate(i, data={}) {
  const name = data.name || `Rutina ${i+1}`;
  const work = data.work || (i === 0 ? 40 : 45);
  const shortRest = data.shortRest || (i === 0 ? 15 : 10);
  const longRest = data.longRest || 60;
  return `
  <div class="card workout-block">
    <div class="block-title">
      <input class="name" value="${name}" aria-label="Nombre del bloque" />
      <button class="danger remove">Eliminar</button>
    </div>
    <div class="grid">
      <div><label>Trabajo por repetición</label>
        <select class="work">
          ${[20,30,40,45,50,60,75,90,120].map(v=>`<option value="${v}" ${v==work?"selected":""}>${v} s</option>`).join("")}
        </select>
      </div>
      <div><label>Repeticiones</label><select disabled><option>3</option></select></div>
      <div><label>Descanso entre repeticiones</label>
        <select class="shortRest">
          <option value="10" ${shortRest==10?"selected":""}>10 s</option>
          <option value="15" ${shortRest==15?"selected":""}>15 s</option>
        </select>
      </div>
      <div><label>Descanso al terminar bloque</label>
        <select class="longRest">
          ${[40,45,50,60].map(v=>`<option value="${v}" ${v==longRest?"selected":""}>${v} s</option>`).join("")}
        </select>
      </div>
    </div>
  </div>`;
}

function addBlock(data) {
  const count = document.querySelectorAll(".workout-block").length;
  if (count >= 6) return;
  blocksEl.insertAdjacentHTML("beforeend", blockTemplate(count, data));
  bindBlocks();
  updateEstimate();
}

function bindBlocks() {
  document.querySelectorAll(".remove").forEach(btn => btn.onclick = () => {
    if (document.querySelectorAll(".workout-block").length <= 1) return;
    btn.closest(".workout-block").remove();
    updateEstimate();
  });
  document.querySelectorAll(".workout-block input,.workout-block select").forEach(el => {
    el.oninput = updateEstimate;
  });
}

function getConfig() {
  return [...document.querySelectorAll(".workout-block")].map(el => ({
    name: el.querySelector(".name").value.trim() || "Ejercicio",
    work: +el.querySelector(".work").value,
    shortRest: +el.querySelector(".shortRest").value,
    longRest: +el.querySelector(".longRest").value
  }));
}

function buildTimeline() {
  const cfg = getConfig();
  const rounds = +$("#rounds").value;
  const out = [{type:"prep", name:"Prepárate", seconds:+$("#prep").value, round:1, rep:0, block:0}];
  for (let r=1; r<=rounds; r++) {
    cfg.forEach((b, bi) => {
      for (let rep=1; rep<=3; rep++) {
        out.push({type:"work", name:b.name, seconds:b.work, round:r, rep, block:bi+1});
        if (rep < 3) out.push({type:"rest", name:"Descanso corto", seconds:b.shortRest, round:r, rep, block:bi+1});
      }
      const isVeryLast = r===rounds && bi===cfg.length-1;
      if (!isVeryLast) out.push({type:"longRest", name:"Recuperación", seconds:b.longRest, round:r, rep:3, block:bi+1});
    });
  }
  out.push({type:"done", name:"Rutina completada", seconds:1, round:rounds, rep:3, block:cfg.length});
  return out;
}

function prepareTimelineMetrics() {
  segmentOffsetsMs = [];
  let running = 0;
  timeline.forEach(seg => {
    segmentOffsetsMs.push(running);
    if (seg.type !== "done") running += seg.seconds * 1000;
  });
  totalDurationMs = running;
}

function formatClock(ms) {
  const totalSeconds = Math.max(0, Math.round(ms / 1000));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;
}

function updateSessionProgress(seg) {
  if (!totalDurationMs) return;
  const segmentElapsed = Math.max(0, seg.seconds * 1000 - remainingMs);
  const elapsed = Math.min(totalDurationMs, (segmentOffsetsMs[index] || 0) + segmentElapsed);
  const progress = Math.max(0, Math.min(1, elapsed / totalDurationMs));
  $("#sessionProgressFill").style.width = `${progress * 100}%`;
  $("#sessionElapsed").textContent = formatClock(elapsed);
  $("#sessionRemaining").textContent = `Restante ${formatClock(totalDurationMs - elapsed)}`;
}

function updateEstimate() {
  const cfg = getConfig();
  const rounds = +$("#rounds").value;
  let perRound = cfg.reduce((sum,b)=>sum + 3*b.work + 2*b.shortRest + b.longRest, 0);
  perRound -= cfg.length ? cfg[cfg.length-1].longRest : 0;
  const betweenRounds = rounds > 1 && cfg.length ? (rounds-1)*cfg[cfg.length-1].longRest : 0;
  const total = +$("#prep").value + perRound*rounds + betweenRounds;
  $("#estimate").textContent = `Duración estimada: ${Math.floor(total/60)} min ${total%60} s`;
}

function applyTheme(type) {
  const theme = themes[$("#theme").value];
  const colors = type === "work" ? theme.work : theme.rest;
  document.documentElement.style.setProperty("--accent", colors[0]);
  document.documentElement.style.setProperty("--accent2", colors[1]);
}

function chooseVisual(seg) {
  const selected = $("#visual").value;
  if (selected !== "alternate") return selected;
  const order = ["horizontal","vertical","circle"];
  return order[(seg.block + seg.rep + seg.round) % 3];
}

function renderVisual(progress, seg) {
  currentVisual = chooseVisual(seg);
  const p = Math.max(0, Math.min(1, progress));
  let html = "";
  if (currentVisual === "horizontal") {
    html = `<div class="bar-h"><div class="fill" style="width:${p*100}%"></div></div>`;
  } else if (currentVisual === "vertical") {
    html = `<div class="bar-v"><div class="fill" style="height:${p*100}%"></div></div>`;
  } else {
    html = `<div class="circle" style="--deg:${p*360}deg"></div>`;
  }
  $("#visualContainer").innerHTML = html;
}

function vibrate(pattern=[80]) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function ensureAudioContext() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!audioContext && Ctx) audioContext = new Ctx();
    return audioContext;
  } catch(e) {
    return null;
  }
}

function unlockAudio() {
  const ctx = ensureAudioContext();
  if (ctx?.state === "suspended") ctx.resume().catch(()=>{});

  [vipAudio, vipFinalAudio].forEach(audio => {
    try {
      audio.pause();
      audio.currentTime = 0;
      audio.volume = 0.001;
      const attempt = audio.play();
      if (attempt?.then) {
        attempt.then(() => {
          audio.pause();
          audio.currentTime = 0;
          audio.volume = 1;
          audioUnlocked = true;
        }).catch(() => {});
      }
    } catch(e) {}
  });

  if (ctx) {
    try {
      const buffer = ctx.createBuffer(1, 1, 22050);
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);
      source.start(0);
      audioUnlocked = true;
    } catch(e) {}
  }
}

function webAudioVip(isFinalSecond=false) {
  const ctx = ensureAudioContext();
  if (!ctx) return;
  const play = () => {
    try {
      const start = ctx.currentTime + 0.005;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(isFinalSecond ? 1280 : 1050, start);
      osc.frequency.exponentialRampToValueAtTime(isFinalSecond ? 850 : 720, start + .15);
      gain.gain.setValueAtTime(.22, start);
      gain.gain.exponentialRampToValueAtTime(.001, start + .18);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(start); osc.stop(start + .18);
    } catch(e) {}
  };
  if (ctx.state === "suspended") ctx.resume().then(play).catch(()=>{});
  else play();
}

function playVip(isFinalSecond=false) {
  const audio = isFinalSecond ? vipFinalAudio : vipAudio;
  try {
    audio.pause();
    audio.currentTime = 0;
    audio.volume = 1;
    const attempt = audio.play();
    if (attempt?.catch) attempt.catch(() => webAudioVip(isFinalSecond));
  } catch(e) {
    webAudioVip(isFinalSecond);
  }
}

function beep(freq=760, duration=.12, volume=.12) {
  const ctx = ensureAudioContext();
  if (!ctx) return;
  const play = () => {
    try {
      const now = ctx.currentTime + .005;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + duration);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + duration);
    } catch(e) {}
  };
  if (ctx.state === "suspended") ctx.resume().then(play).catch(()=>{});
  else play();
}

function playCountdownAlert(seg, seconds) {
  const workCountdown = seg.type === "work" && seconds >= 1 && seconds <= 5;
  const restCountdown = (seg.type === "rest" || seg.type === "longRest") && seconds >= 1 && seconds <= 3;
  if (!(workCountdown || restCountdown) || seconds === lastCountdownSecond) return;
  lastCountdownSecond = seconds;
  playVip(seconds === 1);
  vibrate(seconds === 1 ? [55,35,55] : [45]);
}

function registerInteraction() {
  lastInteractionAt = performance.now();
  $("#timer").classList.remove("controls-hidden");
}

function updateControlsVisibility() {
  if (!workoutActive) {
    $("#timer").classList.remove("controls-hidden");
    return;
  }
  const shouldHide = performance.now() - lastInteractionAt >= 5000;
  $("#timer").classList.toggle("controls-hidden", shouldHide);
}

async function requestWakeLock() {
  if (!workoutActive || document.visibilityState !== "visible" || !("wakeLock" in navigator)) return;
  try {
    if (wakeLock && !wakeLock.released) return;
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch(e) {
    wakeLock = null;
  }
}

async function releaseWakeLock() {
  try {
    if (wakeLock && !wakeLock.released) await wakeLock.release();
  } catch(e) {}
  wakeLock = null;
}

function showSegment(reset=true) {
  const seg = timeline[index];
  if (!seg || seg.type === "done") return finish();
  applyTheme(seg.type);
  $("#phase").textContent =
    seg.type==="work" ? "Trabajo" :
    seg.type==="prep" ? "Preparación" :
    seg.type==="done" ? "Finalizado" : "Descanso";
  $("#exerciseName").textContent = seg.name;
  $("#meta").textContent = seg.type==="prep" ? "" :
    `Ronda ${seg.round}/${$("#rounds").value} · Bloque ${seg.block}/${getConfig().length}` +
    (seg.type==="work" ? ` · Repetición ${seg.rep}/3` : "");
  if (reset) {
    remainingMs = seg.seconds * 1000;
    segmentEnd = performance.now() + remainingMs;
    lastCountdownSecond = null;
    beep(seg.type==="work" ? 900 : 520);
    vibrate(seg.type==="work" ? [100,50,100] : [70]);
  }
  updateFrame();
}

function updateFrame() {
  const seg = timeline[index];
  const seconds = Math.max(0, Math.ceil(remainingMs/1000));
  $("#seconds").textContent = seconds;
  playCountdownAlert(seg, seconds);
  renderVisual(remainingMs/(seg.seconds*1000), seg);
  updateSessionProgress(seg);
}

function tick() {
  updateControlsVisibility();
  if (paused) return;
  remainingMs = Math.max(0, segmentEnd - performance.now());
  updateFrame();
  if (remainingMs <= 0) {
    index++;
    showSegment(true);
  }
}

function startWorkout() {
  timeline = buildTimeline();
  index = 0;
  paused = false;
  workoutActive = true;
  unlockAudio();
  prepareTimelineMetrics();
  $("#sessionProgressFill").style.width = "0%";
  $("#sessionElapsed").textContent = "00:00";
  $("#sessionRemaining").textContent = `Restante ${formatClock(totalDurationMs)}`;
  $("#pause").textContent = "Pausa";
  $("#setup").classList.add("hidden");
  $("#timer").classList.remove("hidden");
  document.body.requestFullscreen?.().catch(()=>{});
  requestWakeLock();
  registerInteraction();
  showSegment(true);
  clearInterval(interval);
  interval = setInterval(tick, 50);
}

function finish() {
  clearInterval(interval);
  workoutActive = false;
  releaseWakeLock();
  $("#timer").classList.remove("controls-hidden");
  $("#sessionProgressFill").style.width = "100%";
  $("#sessionElapsed").textContent = formatClock(totalDurationMs);
  $("#sessionRemaining").textContent = "Restante 00:00";
  beep(1100,.35); vibrate([150,80,150,80,250]);
  $("#phase").textContent = "Finalizado";
  $("#exerciseName").textContent = "Rutina completada";
  $("#seconds").textContent = "✓";
  $("#meta").textContent = "";
  renderVisual(1,{block:0,rep:0,round:0,type:"work"});
}

$("#addBlock").onclick = () => addBlock();
$("#start").onclick = startWorkout;
$("#rounds").onchange = updateEstimate;
$("#prep").onchange = updateEstimate;
$("#saveRoutine").onclick = () => {
  localStorage.setItem("visualTimerConfig", JSON.stringify({
    blocks:getConfig(), theme:$("#theme").value, visual:$("#visual").value,
    rounds:$("#rounds").value, prep:$("#prep").value
  }));
  $("#saveRoutine").textContent = "Guardado ✓";
  setTimeout(()=>$("#saveRoutine").textContent="Guardar configuración",1200);
};
$("#pause").onclick = () => {
  registerInteraction();
  unlockAudio();
  paused = !paused;
  if (paused) {
    remainingMs = Math.max(0, segmentEnd - performance.now());
    $("#pause").textContent = "Continuar";
  } else {
    segmentEnd = performance.now() + remainingMs;
    $("#pause").textContent = "Pausa";
  }
};
$("#next").onclick = () => { registerInteraction(); unlockAudio(); index = Math.min(index+1,timeline.length-1); showSegment(true); };
$("#back").onclick = () => { registerInteraction(); unlockAudio(); index = Math.max(index-1,0); showSegment(true); };
$("#exit").onclick = () => {
  registerInteraction();
  clearInterval(interval);
  workoutActive = false;
  releaseWakeLock();
  $("#timer").classList.remove("controls-hidden");
  $("#timer").classList.add("hidden");
  $("#setup").classList.remove("hidden");
  document.exitFullscreen?.();
};

$("#timer").addEventListener("touchstart", registerInteraction, {passive:true});
$("#timer").addEventListener("mousedown", registerInteraction, {passive:true});
$("#timer").addEventListener("keydown", registerInteraction);
$("#testSound").onclick = () => {
  unlockAudio();
  setTimeout(() => playVip(false), 140);
  $("#testSound").textContent = "🔊 Sonando…";
  setTimeout(() => $("#testSound").textContent = "🔊 Probar sonido", 900);
};
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && workoutActive) requestWakeLock();
});

const saved = JSON.parse(localStorage.getItem("visualTimerConfig") || "null");
if (saved) {
  saved.blocks.forEach(addBlock);
  $("#theme").value=saved.theme||"cardio";
  $("#visual").value=saved.visual||"alternate";
  $("#rounds").value=saved.rounds||"2";
  $("#prep").value=saved.prep||"10";
} else {
  addBlock({name:"Ejercicio 1",work:40,shortRest:15,longRest:60});
  addBlock({name:"Ejercicio 2",work:45,shortRest:10,longRest:60});
}
updateEstimate();
</script>
